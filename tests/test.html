<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            border-radius: 10px;
        }
        .test-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .test-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 15px;
        }
        .test-progress {
            color: #999;
            font-size: 1.1em;
        }
        .loading {
            text-align: center;
            padding: 100px 0;
            color: #999;
            font-size: 1.2em;
        }
        .question-card {
            animation: fadeIn 0.5s ease;
        }
        .question-text {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: center;
        }
        .options-grid {
            display: grid;
            gap: 15px;
        }
        .option-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            text-align: left;
        }
        .option-card:hover {
            background: #667eea;
            border-color: #667eea;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        .result-card {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .result-title {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .result-description {
            font-size: 1.3em;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .result-traits {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .trait-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.95em;
        }
        .result-tips {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            margin-bottom: 30px;
        }
        .result-career {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            margin-bottom: 30px;
        }
        .result-career h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .career-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .career-tag {
            background: white;
            color: #667eea;
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 0.9em;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            text-decoration: none;
            margin: 5px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn-secondary {
            background: #6c757d;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .hidden {
            display: none;
        }
        .error {
            text-align: center;
            padding: 100px 0;
            color: #dc3545;
        }
        .error h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .error a {
            color: #667eea;
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            .test-title {
                font-size: 1.5em;
            }
            .question-text {
                font-size: 1.3em;
            }
            .option-card {
                padding: 15px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="test-header">
            <h1 class="test-title" id="testTitle">加载中...</h1>
            <p class="test-progress" id="testProgress"></p>
        </div>

        <div id="loading" class="loading">
            <p>正在加载测试...</p>
        </div>

        <div id="questionContainer">
            <!-- 问题将在这里动态显示 -->
        </div>

        <div class="error hidden" id="errorContainer">
            <h2>加载测试失败</h2>
            <p id="errorMessage"></p>
            <a href="index.html" class="btn">返回首页</a>
        </div>

        <div class="result-card hidden" id="resultCard">
            <h2 class="result-title" id="resultTitle">你的结果是...</h2>
            <p class="result-description" id="resultDescription"></p>
            <div class="result-traits" id="resultTraits"></div>
            <div class="result-tips">
                <strong>💡 建议：</strong>
                <span id="resultTips"></span>
            </div>
            <div class="result-career" id="resultCareer">
                <h4>🎯 适合的职业方向：</h4>
                <div class="career-tags" id="careerTags"></div>
            </div>
            <div>
                <a href="index.html" class="btn">返回首页</a>
                <button class="btn btn-secondary" onclick="restartTest()">重新测试</button>
            </div>
        </div>
    </div>

    <script>
        let testData = null;
        let currentQuestion = 0;
        let answers = [];

        // 从URL获取测试ID
        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('test');

        // 默认载入专业版 MBTI
        const DEFAULT_TEST = 'mbti-pro';

        // 加载测试数据
        async function loadTest(testId) {
            try {
                const fileName = testId || DEFAULT_TEST;
                const response = await fetch(`data/examples/${fileName}.json`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                return await response.json();
            } catch (error) {
                console.error('加载测试失败:', error);
                throw error;
            }
        }

        // 页面加载
        async function init() {
            try {
                const loading = document.getElementById('loading');
                const questionContainer = document.getElementById('questionContainer');

                loading.style.display = 'block';
                questionContainer.style.display = 'none';

                testData = await loadTest(testId);

                loading.style.display = 'none';
                questionContainer.style.display = 'block';

                document.getElementById('testTitle').textContent = testData.title;
                renderQuestion();
            } catch (error) {
                const loading = document.getElementById('loading');
                const errorContainer = document.getElementById('errorContainer');
                const errorMessage = document.getElementById('errorMessage');

                loading.style.display = 'none';
                errorContainer.classList.remove('hidden');

                errorMessage.textContent = `错误信息: ${error.message}`;
            }
        }

        function renderQuestion() {
            const question = testData.questions[currentQuestion];
            const container = document.getElementById('questionContainer');

            // 更新进度
            document.getElementById('testProgress').textContent = `问题 ${currentQuestion + 1} / ${testData.questions.length}`;
            document.getElementById('progressFill').style.width = `${(currentQuestion / testData.questions.length) * 100}%`;

            // 渲染问题
            let html = '<div class="question-card">';
            html += `<p class="question-text">${question.question}</p>`;
            html += '<div class="options-grid">';

            question.options.forEach(option => {
                html += `<div class="option-card" onclick="selectAnswer('${option.id}')">`;
                html += `<span style="font-weight:bold;">${option.id}.</span> ${option.text}`;
                html += '</div>';
            });

            html += '</div></div>';
            container.innerHTML = html;
        }

        function selectAnswer(optionId) {
            answers.push(optionId);

            if (currentQuestion < testData.questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            // 更新进度100%
            document.getElementById('progressFill').style.width = '100%';

            // 计算结果
            const scores = {};
            answers.forEach(answer => {
                scores[answer] = (scores[answer] || 0) + 1;
            });

            // 根据测试类型计算结果
            let resultType;
            if (testData.category === 'MBTI') {
                resultType =
                    (scores['E'] >= scores['I'] ? 'E' : 'I') +
                    (scores['N'] >= scores['S'] ? 'N' : 'S') +
                    (scores['T'] >= scores['F'] ? 'T' : 'F') +
                    (scores['J'] >= scores['P'] ? 'J' : 'P');
            } else {
                // 默认取得分最高的
                resultType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            }

            const result = testData.results[resultType] || Object.values(testData.results)[0];

            // 显示结果
            document.getElementById('questionContainer').classList.add('hidden');
            document.getElementById('testProgress').classList.add('hidden');

            const resultCard = document.getElementById('resultCard');
            resultCard.classList.remove('hidden');

            document.getElementById('resultTitle').textContent = result.title || '你的结果';
            document.getElementById('resultDescription').textContent = result.description || '';

            // 性格特征
            const traitsContainer = document.getElementById('resultTraits');
            if (result.traits && result.traits.length > 0) {
                traitsContainer.innerHTML = result.traits.map(trait =>
                    `<span class="trait-badge">${trait}</span>`
                ).join('');
            } else {
                traitsContainer.innerHTML = '';
            }

            document.getElementById('resultTips').textContent = result.tips || '暂无建议';

            // 适合的职业
            const careerDiv = document.getElementById('resultCareer');
            const careerTags = document.getElementById('careerTags');
            if (result.career && result.career.length > 0) {
                careerDiv.style.display = 'block';
                careerTags.innerHTML = result.career.map(career =>
                    `<span class="career-tag">${career}</span>`
                ).join('');
            } else {
                careerDiv.style.display = 'none';
            }
        }

        function restartTest() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('questionContainer').classList.remove('hidden');
            document.getElementById('testProgress').classList.remove('hidden');
            document.getElementById('resultCard').classList.add('hidden');
            renderQuestion();
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
