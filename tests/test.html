<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开始测试 | 心灵方舟</title>
    <meta name="description" content="专业心理测试平台">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --primary-light: #3B82F6;
            --accent: #F59E0B;
            --success: #10B981;
            
            --bg-gradient-start: #0F172A;
            --bg-gradient-end: #1E3A5F;
            
            --card-bg: #ffffff;
            
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --text-light: #94A3B8;
            
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.5;
            padding: var(--space-md);
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* 顶部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-sm) 0;
            margin-bottom: var(--space-md);
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.9em;
            padding: var(--space-xs) var(--space-sm);
            background: rgba(255,255,255,0.1);
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .test-label {
            color: rgba(255,255,255,0.7);
            font-size: 0.85em;
        }
        
        /* 进度条 */
        .progress-wrap {
            margin-bottom: var(--space-lg);
        }
        
        .progress-info {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.8);
            font-size: 0.85em;
            margin-bottom: var(--space-xs);
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        /* 测试卡片 */
        .test-card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: var(--space-lg);
            box-shadow: var(--shadow-lg);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .test-title {
            text-align: center;
            margin-bottom: var(--space-md);
        }
        
        .test-title h1 {
            font-size: 1.3em;
            color: var(--text-primary);
            margin-bottom: var(--space-xs);
        }
        
        .test-title p {
            color: var(--text-secondary);
            font-size: 0.85em;
        }
        
        /* 问题区域 */
        .question-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        .question-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            font-weight: 600;
            font-size: 0.8em;
            margin-bottom: var(--space-sm);
        }
        
        .question-text {
            font-size: 1.15em;
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: var(--space-lg);
            font-weight: 500;
        }
        
        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            flex: 1;
            overflow-y: auto;
        }
        
        .option {
            padding: var(--space-md);
            background: #F8FAFC;
            border: 2px solid #E2E8F0;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }
        
        .option:hover {
            border-color: var(--primary);
            background: #EFF6FF;
        }
        
        .option.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, #EFF6FF, #DBEAFE);
        }
        
        .option-letter {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            background: #CBD5E1;
            color: var(--text-secondary);
            border-radius: 50%;
            font-weight: 600;
            font-size: 0.8em;
            flex-shrink: 0;
        }
        
        .option.selected .option-letter {
            background: var(--primary);
            color: white;
        }
        
        .option-text {
            font-size: 0.95em;
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        /* 结果页 */
        #resultPage {
            display: none;
            height: 100%;
            overflow-y: auto;
        }
        
        #resultPage.active {
            display: block;
        }
        
        .result-header {
            text-align: center;
            padding: var(--space-lg) 0;
            border-bottom: 1px solid #E2E8F0;
            margin-bottom: var(--space-lg);
        }
        
        .result-type {
            font-size: 2.2em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .result-name {
            font-size: 1.2em;
            color: var(--text-primary);
            margin-top: var(--space-xs);
        }
        
        .result-desc {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.7;
            text-align: left;
            background: #F8FAFC;
            padding: var(--space-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-lg);
            border-left: 3px solid var(--primary);
        }
        
        .result-section {
            margin-bottom: var(--space-lg);
        }
        
        .result-section h3 {
            font-size: 1em;
            color: var(--text-primary);
            margin-bottom: var(--space-sm);
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-xs);
        }
        
        .tag {
            padding: var(--space-xs) var(--space-md);
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border-radius: 50px;
            font-size: 0.8em;
        }
        
        .tips-box {
            background: #FFFBEB;
            border: 1px solid #FDE68A;
            border-radius: var(--radius-md);
            padding: var(--space-md);
        }
        
        .tips-box h4 {
            color: #B45309;
            font-size: 0.9em;
            margin-bottom: var(--space-xs);
        }
        
        .tips-box p {
            color: #92400E;
            font-size: 0.9em;
            line-height: 1.6;
        }
        
        .career-box {
            background: #F0FDF4;
            border: 1px solid #BBF7D0;
            border-radius: var(--radius-md);
            padding: var(--space-md);
        }
        
        .career-box h4 {
            color: #166534;
            font-size: 0.9em;
            margin-bottom: var(--space-sm);
        }
        
        .career-tags {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-xs);
        }
        
        .career-tag {
            padding: var(--space-xs) var(--space-sm);
            background: white;
            color: #166534;
            border-radius: var(--radius-sm);
            font-size: 0.8em;
            border: 1px solid #BBF7D0;
        }
        
        .result-actions {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
            flex-wrap: wrap;
        }
        
        .btn {
            flex: 1;
            padding: var(--space-md);
            border-radius: var(--radius-md);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            border: none;
            min-width: 100px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        .btn-secondary {
            background: #64748B;
            color: white;
        }
        
        .btn-outline {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        
        /* 加载 */
        .loading {
            text-align: center;
            padding: var(--space-2xl);
            color: rgba(255,255,255,0.8);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            margin: 0 auto var(--space-md);
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 错误 */
        .error {
            text-align: center;
            padding: var(--space-2xl);
            color: white;
        }
        
        .error h2 {
            color: #FCA5A5;
            margin-bottom: var(--space-md);
        }
        
        /* 响应式 */
        @media (max-width: 480px) {
            body {
                padding: var(--space-sm);
            }
            
            .test-card {
                padding: var(--space-md);
                border-radius: var(--radius-lg);
            }
            
            .question-text {
                font-size: 1.05em;
            }
            
            .option {
                padding: var(--space-sm) var(--space-md);
            }
            
            .option-text {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 加载 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在加载...</p>
        </div>
        
        <!-- 错误 -->
        <div class="error" id="error" style="display:none;">
            <h2>加载失败</h2>
            <p id="errorMsg">请稍后重试</p>
            <a href="index.html" class="btn btn-primary" style="display:inline-block;margin-top:16px;">返回首页</a>
        </div>
        
        <!-- 测试页面 -->
        <div id="testPage" style="display:none;height:100%;flex-direction:column;">
            <div class="header">
                <button class="back-btn" onclick="goBack()">← 返回</button>
                <span class="test-label" id="testLabel">MBTI 测试</span>
            </div>
            
            <div class="progress-wrap">
                <div class="progress-info">
                    <span id="progressText">1/12</span>
                    <span id="percentText">8%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width:8%"></div>
                </div>
            </div>
            
            <div class="test-card">
                <div class="test-title">
                    <h1 id="testTitle">测试</h1>
                    <p>选择最符合你的答案</p>
                </div>
                
                <div class="question-area">
                    <div class="question-num" id="questionNum">1</div>
                    <p class="question-text" id="questionText">加载中...</p>
                    
                    <div class="options" id="options">
                        <!-- 选项 -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 结果页面 -->
        <div id="resultPage">
            <div class="test-card">
                <div class="result-header">
                    <div class="result-type" id="resultType">INTJ</div>
                    <div class="result-name" id="resultName">战略策划者</div>
                </div>
                
                <div class="result-desc" id="resultDesc">
                    结果描述
                </div>
                
                <div class="result-section">
                    <h3>性格特质</h3>
                    <div class="tags" id="resultTraits"></div>
                </div>
                
                <div class="result-section">
                    <div class="tips-box">
                        <h4>💡 发展建议</h4>
                        <p id="resultTips">建议内容</p>
                    </div>
                </div>
                
                <div class="result-section" id="careerSection" style="display:none;">
                    <div class="career-box">
                        <h4>💼 适合职业</h4>
                        <div class="career-tags" id="resultCareer"></div>
                    </div>
                </div>
                
                <div class="result-actions">
                    <button class="btn btn-primary" onclick="shareResult()">📤 分享结果</button>
                    <button class="btn btn-secondary" onclick="restartTest()">🔄 重新测试</button>
                    <a href="index.html" class="btn btn-outline">🏠 首页</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let testData = null;
        let currentQ = 0;
        let answers = {};
        
        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('test') || 'mbti-pro';
        
        // 加载测试
        async function init() {
            try {
                const res = await fetch(`data/examples/${testId}.json`);
                if (!res.ok) throw new Error('加载失败');
                
                testData = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('testPage').style.display = 'flex';
                
                document.getElementById('testLabel').textContent = testData.title || '心理测试';
                document.getElementById('testTitle').textContent = testData.title || '测试';
                
                renderQuestion();
            } catch (e) {
                console.error(e);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('errorMsg').textContent = e.message;
            }
        }
        
        // 渲染问题
        function renderQuestion() {
            const q = testData.questions[currentQ];
            const total = testData.questions.length;
            
            // 更新进度
            const pct = Math.round(((currentQ + 1) / total) * 100);
            document.getElementById('progressText').textContent = `${currentQ + 1}/${total}`;
            document.getElementById('percentText').textContent = `${pct}%`;
            document.getElementById('progressFill').style.width = `${pct}%`;
            
            // 显示问题
            document.getElementById('questionNum').textContent = currentQ + 1;
            document.getElementById('questionText').textContent = q.question;
            
            // 渲染选项
            const opts = document.getElementById('options');
            opts.innerHTML = q.options.map((opt, i) => `
                <div class="option ${answers[currentQ] === opt.id ? 'selected' : ''}" 
                     data-id="${opt.id}" onclick="selectOption('${opt.id}')">
                    <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                    <span class="option-text">${opt.text}</span>
                </div>
            `).join('');
        }
        
        // 选择选项
        function selectOption(optId) {
            answers[currentQ] = optId;
            
            // 立即显示选中效果
            document.querySelectorAll('.option').forEach(el => {
                el.classList.toggle('selected', el.dataset.id === optId);
            });
            
            // 自动进入下一题
            setTimeout(() => {
                if (currentQ < testData.questions.length - 1) {
                    currentQ++;
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 200);
        }
        
        // 显示结果
        function showResult() {
            // 计算得分
            const scores = {};
            Object.values(answers).forEach(a => scores[a] = (scores[a] || 0) + 1);
            
            // 计算结果类型
            let resultType;
            if (testData.category === 'MBTI') {
                resultType = 
                    (scores['E'] >= scores['I'] ? 'E' : 'I') +
                    (scores['N'] >= scores['S'] ? 'N' : 'S') +
                    (scores['T'] >= scores['F'] ? 'T' : 'F') +
                    (scores['J'] >= scores['P'] ? 'J' : 'P');
            } else {
                resultType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            }
            
            const result = testData.results[resultType] || Object.values(testData.results)[0];
            
            // 隐藏测试页，显示结果页
            document.getElementById('testPage').style.display = 'none';
            const resultPage = document.getElementById('resultPage');
            resultPage.classList.add('active');
            
            // 填充结果
            document.getElementById('resultType').textContent = resultType;
            document.getElementById('resultName').textContent = result.title || '';
            document.getElementById('resultDesc').textContent = result.description || '';
            document.getElementById('resultTips').textContent = result.traits ? result.tips : '暂无建议';
            
            // 特质标签
            if (result.traits && result.traits.length) {
                document.getElementById('resultTraits').innerHTML = 
                    result.traits.map(t => `<span class="tag">${t}</span>`).join('');
            }
            
            // 职业推荐
            const careerSec = document.getElementById('careerSection');
            if (result.career && result.career.length) {
                careerSec.style.display = 'block';
                document.getElementById('resultCareer').innerHTML = 
                    result.career.map(c => `<span class="career-tag">${c}</span>`).join('');
            } else {
                careerSec.style.display = 'none';
            }
            
            // 保存历史
            const history = JSON.parse(localStorage.getItem('testHistory') || '[]');
            history.unshift({ testId, type: resultType, title: result.title, date: new Date().toISOString() });
            localStorage.setItem('testHistory', JSON.stringify(history.slice(0, 10)));
        }
        
        // 分享
        function shareResult() {
            const type = document.getElementById('resultType').textContent;
            const name = document.getElementById('resultName').textContent;
            const text = `我在心灵方舟做了${testData.title}，结果是【${type}】${name}！你也来测测吧！`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('结果已复制，快去分享吧！');
            }).catch(() => {
                alert(text);
            });
        }
        
        // 重新测试
        function restartTest() {
            currentQ = 0;
            answers = {};
            document.getElementById('resultPage').classList.remove('active');
            document.getElementById('testPage').style.display = 'flex';
            renderQuestion();
        }
        
        // 返回
        function goBack() {
            if (confirm('确定要返回吗？测试进度会丢失。')) {
                window.location.href = 'index.html';
            }
        }
        
        // 启动
        init();
    </script>
</body>
</html>
