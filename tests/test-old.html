<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .test-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .test-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 15px;
        }

        .test-progress {
            color: #999;
            font-size: 1.1em;
        }

        .question-card {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .question-card.active {
            display: block;
        }

        .question-text {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: center;
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            text-align: left;
        }

        .option-card:hover {
            background: #667eea;
            border-color: #667eea;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .result-card {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .result-card.show {
            display: block;
        }

        .result-title {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .result-description {
            font-size: 1.3em;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .result-traits {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .trait-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.95em;
        }

        .result-tips {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            text-decoration: none;
            margin: 5px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: #6c757d;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            .test-title {
                font-size: 1.5em;
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-card {
                padding: 15px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="test-header">
            <h1 class="test-title" id="testTitle">加载中...</h1>
            <p class="test-progress" id="testProgress">问题 1 / 10</p>
        </div>

        <div id="questionContainer">
            <!-- 问题将通过JS加载 -->
        </div>

        <div class="result-card" id="resultCard">
            <h2 class="result-title" id="resultTitle">你的结果是...</h2>
            <p class="result-description" id="resultDescription"></p>
            <div class="result-traits" id="resultTraits"></div>
            <div class="result-tips">
                <strong>💡 建议：</strong>
                <span id="resultTips"></span>
            </div>
            <div>
                <a href="index.html" class="btn">返回首页</a>
                <button class="btn btn-secondary" onclick="restartTest()">重新测试</button>
            </div>
        </div>
    </div>

    <script src="js/loader.js"></script>
    <script>
        let testData = null;
        let currentQuestion = 0;
        let answers = [];

        // 从URL获取测试ID
        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('test');

        if (!testId) {
            window.location.href = 'index.html';
        }

        // 加载测试数据
        loadTest(testId).then(data => {
            testData = data;
            document.getElementById('testTitle').textContent = data.title;
            renderQuestion();
        }).catch(err => {
            alert('加载测试失败: ' + err.message);
            window.location.href = 'index.html';
        });

        function renderQuestion() {
            const question = testData.questions[currentQuestion];
            const container = document.getElementById('questionContainer');

            // 更新进度
            document.getElementById('testProgress').textContent = `问题 ${currentQuestion + 1} / ${testData.questions.length}`;
            document.getElementById('progressFill').style.width = `${(currentQuestion / testData.questions.length) * 100}%`;

            // 渲染问题
            let html = `<div class="question-card active">`;
            html += `<p class="question-text">${question.question}</p>`;
            html += `<div class="options-grid">`;

            question.options.forEach(option => {
                html += `<div class="option-card" onclick="selectAnswer('${option.id}')">`;
                html += `<span class="option-label" style="font-weight:bold;">${option.id}.</span> ${option.text}`;
                html += `</div>`;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        function selectAnswer(optionId) {
            answers.push(optionId);

            if (currentQuestion < testData.questions.length - 1) {
                currentQuestion++;
                // 添加淡出效果
                const currentCard = document.querySelector('.question-card.active');
                currentCard.style.animation = 'none';
                currentCard.classList.remove('active');

                setTimeout(() => {
                    renderQuestion();
                }, 100);
            } else {
                showResult();
            }
        }

        function showResult() {
            // 更新进度100%
            document.getElementById('progressFill').style.width = '100%';

            // 计算结果
            const result = calculateResult(answers);

            // 显示结果
            document.getElementById('questionContainer').style.display = 'none';
            document.getElementById('testProgress').style.display = 'none';

            document.getElementById('resultCard').classList.add('show');
            document.getElementById('resultTitle').textContent = result.title;
            document.getElementById('resultDescription').textContent = result.description;

            // 渲染性格特征
            const traitsContainer = document.getElementById('resultTraits');
            if (result.traits && result.traits.length > 0) {
                traitsContainer.innerHTML = result.traits.map(trait =>
                    `<span class="trait-badge">${trait}</span>`
                '').join('');
            } else {
                traitsContainer.innerHTML = '';
            }

            document.getElementById('resultTips').textContent = result.tips || '暂无建议';
        }

        function calculateResult(answers) {
            // 简单的计分逻辑
            let scores = {};

            answers.forEach(answer => {
                if (!scores[answer]) {
                    scores[answer] = 0;
                }
                scores[answer]++;
            });

            // 找出得分最高的选项
            let maxScore = -1;
            let maxOption = '';

            for (let option in scores) {
                if (scores[option] > maxScore) {
                    maxScore = scores[option];
                    maxOption = option;
                }
            }

            // 根据测试类型返回结果
            if (testData.category === 'MBTI') {
                // MBTI 特殊处理，组合字母
                let resultType = '';
                const types = ['E/I', 'T/F', 'J/P', 'S/N'];
                type scores: Record<string, number> = {};

                testData.questions.forEach(q => {
                    q.options.forEach(o => {
                        if (!scores[o.id]) scores[o.id] = 0;
                    });
                });

                answers.forEach(answer => {
                    scores[answer]++;
                });

                // 计算每个维度的主导特征
                resultType = (scores['E'] >= scores['I'] ? 'E' : 'I') +
                           (scores['N'] >= scores['S'] ? 'N' : 'S') +
                           (scores['T'] >= scores['F'] ? 'T' : 'F') +
                           (scores['J'] >= scores['P'] ? 'J' : 'P');

                return testData.results[resultType] || testData.results['INTJ'];
            } else {
                // 默认逻辑，返回得分最高的结果
                if (testData.results[maxOption]) {
                    return testData.results[maxOption];
                }

                // 如果没有匹配结果，返回第一个
                const resultKeys = Object.keys(testData.results);
                return testData.results[resultKeys[0]] || {
                    title: '结果待完善',
                    description: '这个测试的结果还没完善，敬请期待！',
                    traits: [],
                    tips: '请留后续版本体验完整功能'
                };
            }
        }

        function restartTest() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('questionContainer').style.display = 'block';
            document.getElementById('testProgress').style.display = 'block';
            document.getElementById('resultCard').classList.remove('show');
            renderQuestion();
        }
    </script>
</body>
</html>
